services:
  postgres:
    image: postgres:16-alpine
    container_name: mango_postgres
    environment:
      POSTGRES_USER: mango
      POSTGRES_PASSWORD: mango
      POSTGRES_DB: mango
    ports:
      - '5432:5432'
    volumes:
      - mango_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mango -d mango']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mango_redis
    ports:
      - '6379:6379'
    volumes:
      - mango_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: mango_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mango
      MINIO_ROOT_PASSWORD: mango12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - mango_minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mango_pg_data:
  mango_redis_data:
  mango_minio_data:
